name: Import Shopify Blog Articles

on:
  workflow_dispatch:
    inputs:
      oauth_code:
        description: 'Code OAuth Shopify (voir instructions)'
        required: true

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Exchange OAuth code and import articles
        env:
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_OAUTH_CODE: ${{ github.event.inputs.oauth_code }}
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const CLIENT_ID = '52f787a4f33f1a3fd43e6dbb19143cd9';
          const CLIENT_SECRET = process.env.SHOPIFY_CLIENT_SECRET;
          const CODE = process.env.SHOPIFY_OAUTH_CODE;
          const SHOP = 'essentiel-car.myshopify.com';

          function post(hostname, urlPath, body) {
            return new Promise((resolve, reject) => {
              const bodyStr = JSON.stringify(body);
              const req = https.request({
                hostname, path: urlPath, method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(bodyStr)
                }
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => { try { resolve(JSON.parse(data)); } catch(e) { reject(e); } });
              });
              req.on('error', reject);
              req.write(bodyStr);
              req.end();
            });
          }

          function get(hostname, urlPath, token) {
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname, path: urlPath, method: 'GET',
                headers: { 'X-Shopify-Access-Token': token, 'Content-Type': 'application/json' }
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve({ body: JSON.parse(data), headers: res.headers }); }
                  catch(e) { reject(e); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          function slugify(text) {
            return text.toLowerCase()
              .normalize('NFD').replace(/[̀-ͯ]/g, '')
              .replace(/[^a-z0-9\s-]/g, '').trim()
              .replace(/\s+/g, '-').replace(/-+/g, '-').substring(0, 60);
          }

          function stripHtml(html) {
            return (html || '')
              .replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n')
              .replace(/<\/h[1-6]>/gi, '\n').replace(/<[^>]+>/g, '')
              .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
              .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ')
              .replace(/\n{3,}/g, '\n\n').trim();
          }

          function parseSections(bodyHtml, excerpt) {
            const text = stripHtml(bodyHtml);
            const paragraphs = text.split('\n\n').filter(p => p.trim().length > 30);
            if (paragraphs.length === 0) return [{ type: 'intro', text: excerpt || text.substring(0, 200) }];
            const sections = [{ type: 'intro', text: paragraphs[0].trim() }];
            const titles = ['En detail', 'Ce qu\'il faut savoir', 'Les points cles', 'Notre analyse', 'Conclusion'];
            let ti = 0;
            for (let i = 1; i < paragraphs.length; i++) {
              const para = paragraphs[i].trim();
              if (para.length < 20) continue;
              if (i % 2 === 1 && ti < titles.length) sections.push({ type: 'h2', text: titles[ti++] });
              sections.push({ type: 'p', text: para });
            }
            const last = sections[sections.length - 1];
            if (last && last.type === 'p' && /boutique|commander|decouvrir|retrouver|essentiel/i.test(last.text)) {
              last.type = 'conclusion';
            }
            return sections;
          }

          function detectCategory(tags, title) {
            const text = (tags.join(' ') + ' ' + title).toLowerCase();
            if (/nettoy|lav|propre|polish|brillan|cire|ceramique/i.test(text)) return 'Nettoyage';
            if (/securit|dashcam|camera|radar|alerte|accident/i.test(text)) return 'Securite';
            if (/carross|peinture|rayure|bosselure/i.test(text)) return 'Carrosserie';
            if (/confort|siege|coussin|chauffant|tapis|coffre/i.test(text)) return 'Confort';
            if (/tech|gps|bluetooth|usb|charg|ecran|connecte/i.test(text)) return 'High-Tech';
            return 'Entretien';
          }

          async function main() {
            // Step 1: Exchange OAuth code for access token
            console.log('Exchanging OAuth code for access token...');
            const tokenRes = await post(SHOP, '/admin/oauth/access_token', {
              client_id: CLIENT_ID,
              client_secret: CLIENT_SECRET,
              code: CODE
            });

            if (!tokenRes.access_token) {
              console.error('Token exchange failed:', JSON.stringify(tokenRes));
              process.exit(1);
            }

            const ACCESS_TOKEN = tokenRes.access_token;
            console.log('Token obtained successfully');

            // Step 2: Get all blogs
            const blogsRes = await get(SHOP, '/admin/api/2024-01/blogs.json', ACCESS_TOKEN);
            const blogs = blogsRes.body.blogs || [];
            console.log(blogs.length + ' blog(s) found');

            // Step 3: Get all articles
            let allArticles = [];
            for (const blog of blogs) {
              let pageInfo = null;
              let hasMore = true;
              while (hasMore) {
                let urlPath = '/admin/api/2024-01/blogs/' + blog.id + '/articles.json?limit=50&status=active';
                if (pageInfo) urlPath += '&page_info=' + pageInfo;
                const res = await get(SHOP, urlPath, ACCESS_TOKEN);
                const articles = res.body.articles || [];
                allArticles = allArticles.concat(articles);
                const link = res.headers.link || '';
                const next = link.match(/<[^>]*page_info=([^&>]+)[^>]*>;\s*rel="next"/);
                if (next) { pageInfo = next[1]; await new Promise(r => setTimeout(r, 300)); }
                else hasMore = false;
              }
            }
            console.log(allArticles.length + ' articles fetched from Shopify');

            // Step 4: Load existing blog data
            const blogDataPath = path.join(__dirname, 'assets/data/blog-posts.json');
            const blogData = JSON.parse(fs.readFileSync(blogDataPath, 'utf8'));
            const existingSlugs = new Set(blogData.articles.map(a => a.slug));

            // Step 5: Convert and add new articles, update images for existing
            const converted = [];
            let skipped = 0;
            let updatedImages = 0;
            for (const sa of allArticles) {
              const slug = sa.handle || slugify(sa.title);
              const imageUrl = sa.image && sa.image.src ? sa.image.src : null;
              if (existingSlugs.has(slug)) {
                // Update image for existing article if missing
                if (imageUrl) {
                  const idx = blogData.articles.findIndex(a => a.slug === slug);
                  if (idx !== -1 && !blogData.articles[idx].image) {
                    blogData.articles[idx].image = imageUrl;
                    updatedImages++;
                  }
                }
                skipped++;
                continue;
              }
              const tags = sa.tags ? sa.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
              const bodyText = stripHtml(sa.body_html || '');
              const excerpt = sa.excerpt || bodyText.substring(0, 150).trim() + '...';
              const article = {
                id: blogData.articles.length + converted.length + 1,
                slug,
                title: sa.title,
                excerpt,
                category: detectCategory(tags, sa.title),
                emoji: '🚗',
                date: sa.published_at ? sa.published_at.split('T')[0] : new Date().toISOString().split('T')[0],
                readTime: Math.max(2, Math.round(bodyText.split(/\s+/).length / 200)),
                tags: tags.slice(0, 6),
                sections: parseSections(sa.body_html || '', excerpt)
              };
              if (imageUrl) article.image = imageUrl;
              converted.push(article);
              existingSlugs.add(slug);
            }

            console.log('New articles: ' + converted.length + ' | Images updated: ' + updatedImages + ' | Skipped: ' + skipped);

            if (converted.length === 0 && updatedImages === 0) {
              console.log('Nothing to update.');
              return;
            }

            if (converted.length > 0) {
              converted.sort((a, b) => new Date(b.date) - new Date(a.date));
              blogData.articles = [...converted, ...blogData.articles];
            }
            blogData.meta.lastUpdated = new Date().toISOString().split('T')[0];
            blogData.meta.totalArticles = blogData.articles.length;

            fs.writeFileSync(blogDataPath, JSON.stringify(blogData, null, 2), 'utf8');
            console.log('SUCCESS: ' + blogData.articles.length + ' total articles, ' + updatedImages + ' images added');
          }

          main().catch(err => {
            console.error('ERROR:', err.message);
            process.exit(1);
          });
          SCRIPT

      - name: Commit imported articles
        run: |
          git config --local user.email "blog-bot@essentielcar.com"
          git config --local user.name "ESSENTIEL CAR Blog Bot"
          git add assets/data/blog-posts.json
          git diff --staged --quiet || git commit -m "Blog: import articles Shopify ($(date +%Y-%m-%d))"
          git push origin main
