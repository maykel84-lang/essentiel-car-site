name: Generate Blog Articles

on:
  schedule:
    # 8h00 Paris (7h00 UTC été / 6h00 UTC hiver) → 2 articles/jour
    - cron: '0 7 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Sujet de l article (optionnel, sinon automatique)'
        required: false
        default: ''
      category:
        description: 'Catégorie'
        required: false
        default: 'Auto'
        type: choice
        options:
          - Auto
          - Nettoyage
          - Sécurité
          - Carrosserie
          - Confort
          - High-Tech
          - Entretien

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
          MANUAL_CATEGORY: ${{ github.event.inputs.category }}
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          // Load existing articles to avoid duplicates
          const blogData = JSON.parse(fs.readFileSync('assets/data/blog-posts.json', 'utf8'));
          const existingSlugs = blogData.articles.map(a => a.slug);
          const existingTitles = blogData.articles.map(a => a.title.toLowerCase());

          const categories = ['Nettoyage', 'Sécurité', 'Carrosserie', 'Confort', 'High-Tech', 'Entretien'];
          const manualCategory = process.env.MANUAL_CATEGORY && process.env.MANUAL_CATEGORY !== 'Auto'
            ? process.env.MANUAL_CATEGORY
            : categories[Math.floor(Math.random() * categories.length)];

          const topicInstruction = process.env.MANUAL_TOPIC
            ? `Le sujet imposé est : "${process.env.MANUAL_TOPIC}".`
            : `Choisis un sujet pertinent et SEO dans la catégorie "${manualCategory}" pour des accessoires auto en France.`;

          const existingList = existingTitles.slice(0, 20).join('\n- ');

          const prompt = `Tu es un expert en accessoires automobiles et SEO français. Génère un article de blog complet pour le site ESSENTIEL CAR, une boutique en ligne d'accessoires auto haut de gamme.

${topicInstruction}

Articles déjà existants (ne PAS dupliquer) :
- ${existingList}

IMPORTANT : Réponds UNIQUEMENT avec un objet JSON valide, sans markdown, sans texte avant ou après.

Format JSON exact attendu :
{
  "slug": "slug-url-optimise-seo",
  "title": "Titre accrocheur et SEO (60 chars max)",
  "excerpt": "Description courte de 150 chars max, avec le mot-clé principal",
  "category": "${manualCategory}",
  "emoji": "🔧",
  "readTime": 5,
  "tags": ["tag1", "tag2", "tag3", "tag4"],
  "sections": [
    {"type": "intro", "text": "Texte d'intro accrocheur (2-3 phrases, pose le problème)"},
    {"type": "h2", "text": "Titre de section 1"},
    {"type": "p", "text": "Paragraphe détaillé de 60 à 100 mots"},
    {"type": "h2", "text": "Titre de section 2"},
    {"type": "p", "text": "Paragraphe détaillé"},
    {"type": "ul", "items": ["Point 1", "Point 2", "Point 3", "Point 4"]},
    {"type": "h2", "text": "Titre de section 3"},
    {"type": "p", "text": "Paragraphe détaillé"},
    {"type": "tip", "text": "Conseil pratique et actionnable (1-2 phrases)"},
    {"type": "h2", "text": "Titre de section 4"},
    {"type": "p", "text": "Paragraphe détaillé"},
    {"type": "conclusion", "text": "Conclusion avec appel à l'action vers la boutique ESSENTIEL CAR (2 phrases)"}
  ]
}

Règles :
- L'article doit faire entre 500 et 800 mots au total
- Optimisé SEO longue traîne français
- Pratique, informatif, pas de jargon inutile
- La conclusion mentionne toujours la boutique ESSENTIEL CAR
- Le slug doit être en français kebab-case, unique, 4-6 mots max
- readTime entre 4 et 8 minutes`;

          function callClaude(prompt) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }]
              });

              const options = {
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    if (parsed.error) reject(new Error(parsed.error.message));
                    else resolve(parsed.content[0].text);
                  } catch(e) { reject(e); }
                });
              });

              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            console.log('Generating article for category:', manualCategory);

            const rawText = await callClaude(prompt);
            console.log('Claude response received');

            // Extract JSON from response
            let articleData;
            try {
              // Try direct parse first
              articleData = JSON.parse(rawText.trim());
            } catch(e) {
              // Try to extract JSON from markdown code block
              const match = rawText.match(/```(?:json)?\s*([\s\S]*?)```/);
              if (match) {
                articleData = JSON.parse(match[1].trim());
              } else {
                // Try to find JSON object in text
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                  articleData = JSON.parse(jsonMatch[0]);
                } else {
                  throw new Error('No valid JSON found in response');
                }
              }
            }

            // Validate required fields
            if (!articleData.slug || !articleData.title || !articleData.sections) {
              throw new Error('Missing required fields in generated article');
            }

            // Ensure unique slug
            let slug = articleData.slug;
            let counter = 2;
            while (existingSlugs.includes(slug)) {
              slug = articleData.slug + '-' + counter;
              counter++;
            }
            articleData.slug = slug;

            // Add metadata
            const today = new Date().toISOString().split('T')[0];
            articleData.id = blogData.articles.length + 1;
            articleData.date = today;

            // Add to articles array (prepend so newest first)
            blogData.articles.unshift(articleData);
            blogData.meta.lastUpdated = today;
            blogData.meta.totalArticles = blogData.articles.length;
            blogData.meta.autoGenerated = true;

            // Write updated JSON
            fs.writeFileSync(
              'assets/data/blog-posts.json',
              JSON.stringify(blogData, null, 2),
              'utf8'
            );

            console.log('Article generated successfully:', articleData.title);
            console.log('Slug:', articleData.slug);
            console.log('Total articles:', blogData.articles.length);

            // Set output for commit step
            fs.writeFileSync('/tmp/article_title.txt', articleData.title);
          }

          main().catch(err => {
            console.error('Error generating article:', err.message);
            process.exit(1);
          });
          SCRIPT

      - name: Read article title
        id: article_info
        run: |
          TITLE=$(cat /tmp/article_title.txt 2>/dev/null || echo "Nouvel article")
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit and push new article
        run: |
          git config --local user.email "blog-bot@essentielcar.com"
          git config --local user.name "ESSENTIEL CAR Blog Bot"
          git add assets/data/blog-posts.json
          git diff --staged --quiet || git commit -m "Blog: ajout automatique — ${{ steps.article_info.outputs.title }} (${{ steps.article_info.outputs.date }})"
          git push origin main
