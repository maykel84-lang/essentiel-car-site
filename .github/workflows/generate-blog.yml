name: Generate Blog Articles

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Sujet de l article (optionnel, sinon automatique)'
        required: false
        default: ''
      category:
        description: 'Categorie'
        required: false
        default: 'Auto'
        type: choice
        options:
          - Auto
          - Nettoyage
          - Securite
          - Carrosserie
          - Confort
          - High-Tech
          - Entretien

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sharp + polices de caractères
        run: |
          npm install sharp --no-save
          sudo apt-get install -y fonts-liberation fonts-ubuntu ttf-ubuntu-font-family 2>/dev/null || true

      - name: Generate article via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
          MANUAL_CATEGORY: ${{ github.event.inputs.category }}
        run: node tools/generate-article.js

      - name: Generate blog card image
        run: node tools/run-card.js

      - name: Update sitemap
        run: node tools/generate-sitemap.js

      - name: Read article title
        id: article_info
        run: |
          TITLE=$(cat /tmp/article_title.txt 2>/dev/null || echo "Nouvel article")
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit and push new article
        run: |
          git config --local user.email "blog-bot@essentielcar.com"
          git config --local user.name "ESSENTIEL CAR Blog Bot"
          mkdir -p assets/images/blog
          git add assets/data/blog-posts.json sitemap.xml assets/images/blog/
          git diff --staged --quiet || git commit -m "Blog: ajout automatique - ${{ steps.article_info.outputs.title }} (${{ steps.article_info.outputs.date }})"
          git push origin main
